<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Análise Financeira YoY</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.73.0/build/stlite.css" />
  </head>
  <body>
    <div id="root" style="height: 100vh;"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.73.0/build/stlite.js"></script>
    <script>
      stlite.mount(
        {
          requirements: ["streamlit", "pandas", "openpyxl", "xlsxwriter", "pyarrow", "fastparquet", "plotly"],
          entrypoint: "main.py",
          files: {
            "main.py": { url: "./main.py?v=22" },
            "logic.py": { url: "./logic.py?v=22" },
            "planejamento_logic.py": { url: "./planejamento_logic.py?v=22" },
            "utils.py": { url: "./utils.py?v=22" },
            "referencia_colunas.json": { url: "./referencia_colunas.json?v=22" },
            // 🚨 AQUI ESTÁ O SEGREDO:
            "dim_contas.csv.gz": { url: "./dim_contas.csv.gz?v=22" },
            "dim_centros_custo.csv.gz": { url: "./dim_centros_custo.csv.gz?v=22" }
        }
        },
        document.getElementById("root")
      );
    </script>
  </body>
</html>
