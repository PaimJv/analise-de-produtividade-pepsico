<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Auditoria Financeira - Facilities</title>
    <link rel="stylesheet" href="stlite.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["pandas", "plotly", "openpyxl"], // Adicione aqui o que estiver no seu requirements.txt
        entrypoint: "main.py",
        files: {
          "main.py": { url: "main.py" },
          "logic.py": { url: "logic.py" },
          "utils.py": { url: "utils.py" },
          "sidebar.py": { url: "sidebar.py" },
          "components.py": { url: "components.py" },
          // Se houver uma logo: "logo.png": { url: "logo.png" }
        },
      }, document.getElementById("root"));
    </script>
  </body>
</html>
